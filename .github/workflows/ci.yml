name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (with binary feature, default)
        run: cargo test --workspace
      - name: Test (text-only, no Polars)
        run: cargo test -p anomalyx-normalize --no-default-features

# The 0-surviving-mutant gate is intentionally NOT run in CI — cargo-mutants
# spends far too many hosted-runner minutes. It is enforced locally instead via
# `./scripts/gates.sh` and the `gate` workflow, and is the contributor's
# responsibility before pushing (see CLAUDE.md).

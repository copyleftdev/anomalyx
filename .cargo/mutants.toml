# cargo-mutants configuration for the strong mutation gate.
#
# The default gate is 0 survivors. Entries below are EQUIVALENT mutants —
# mutations that cannot change observable behavior for any input — documented
# individually so the exclusion is auditable, not a blanket suppression.

exclude_re = [
    # `t < c` vs `t <= c` where t,c are byte indices of '\t' and ',' in the same
    # string. They index distinct characters, so they are never equal; `<=` is
    # behaviorally identical to `<`. Provably equivalent, not a test gap.
    "replace < with <= in tab_before_comma",

    # ZeekParser claims no file extension (returns `&[]`), so the `Vec::new()`
    # mutant produces the same empty slice — identical behavior. (The non-empty
    # `vec![…]` extension mutants ARE caught, by a `extensions().is_empty()` test.)
    'ZeekParser>::extensions.*Vec::new',

    # JournalParser likewise claims no extension (returns `&[]`); the empty
    # `Vec::leak(Vec::new())` mutant yields the same empty slice. Identical
    # behavior — no input can observe the difference. (Same case as Zeek above.)
    'JournalParser>::extensions.*Vec::new',

    # EveParser also claims no extension (returns `&[]`) — same empty-slice
    # equivalence as Zeek/Journal above.
    'EveParser>::extensions.*Vec::new',

    # CloudTrailParser also claims no extension (returns `&[]`) — same empty-slice
    # equivalence as Zeek/Journal/Eve above.
    'CloudTrailParser>::extensions.*Vec::new',

    # AuditdParser also claims no extension (returns `&[]`) — same empty-slice
    # equivalence as Zeek/Journal/Eve/CloudTrail above.
    'AuditdParser>::extensions.*Vec::new',

    # OsqueryParser also claims no extension (returns `&[]`) — same empty-slice
    # equivalence as the parsers above.
    'OsqueryParser>::extensions.*Vec::new',

    # NetflowParser also claims no extension (returns `&[]`) — same empty-slice
    # equivalence as the parsers above.
    'NetflowParser>::extensions.*Vec::new',

    # Parser sniff confidences are registered in strictly descending order
    # (MAGIC > STRONG > TEXT > FALLBACK), so the highest-confidence match is
    # always unique — no two firing parsers ever tie. The `>` → `==` / `>=`
    # variants only differ on a tie, which is unreachable; equivalent mutants.
    "replace > with == in ParserRegistry::resolve",
    "replace > with >= in ParserRegistry::resolve",

    # Significance/threshold comparisons against a *continuous* statistic. The
    # `<`→`<=` (or `>`→`>=`) variants differ only when the statistic lands
    # exactly on the threshold (p == α, or PSI == threshold). For p-values from
    # ks_q / ChiSquared and a quantile-binned PSI this is a measure-zero event,
    # unreachable by any realistic input — equivalent mutants, not test gaps.
    "replace < with <= in <impl Detector for KsDetector>::detect",
    "replace < with <= in <impl Detector for Chi2Detector>::detect",
    "replace > with >= in <impl Detector for PsiDetector>::detect",
    "replace < with <= in <impl Detector for MahalanobisDetector>::detect",
    "replace > with >= in <impl Detector for CusumDetector>::detect",
    "replace > with >= in <impl Detector for CadenceDetector>::detect",

    # CUSUM uses only |S_k|, so negating the accumulation (`+=` → `-=`) leaves
    # every magnitude — and thus the chosen change point — identical. Equivalent.
    # (literal string: `\+` escapes the regex metacharacter `+`)
    'replace \+= with -= in cusum_changepoint',
    # The split index runs 1..n; admitting split == n (`<` → `<=`) only adds a
    # point whose CUSUM is exactly 0 (the full-sum constraint), which can never
    # be the arg-max once any earlier split has been seen. Equivalent.
    "replace < with <= in cusum_changepoint",

    # CEF extension scan advances `i = j + 1` past the `=` at index j after
    # recording a key. The `+`→`*` variant sets `i = j` (the `=` itself); since
    # `=` is not an identifier char, the very next iteration skips it and lands on
    # j+1 — the identical key set, just one extra no-op step. Equivalent. (The
    # `+`→`-` variant is NOT equivalent: it re-detects a 1-char key forever and is
    # caught as a timeout by the `a=1 b=2` test.)
    'replace \+ with \* in parse_cef_extension',

    # `naive_one_pass_variance` is a deliberately *inaccurate* reference baseline
    # (the textbook one-pass formula), kept only to demonstrate the precision gap
    # against our compensated reductions. Its sole contract — "less accurate than
    # ax_core::det" — is preserved by every arithmetic mutation, so its mutants
    # are equivalent. The accurate path it contrasts with is gated normally.
    "naive_one_pass_variance",
]

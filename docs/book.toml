[book]
title = "anomalyx"
authors = ["copyleftdev"]
description = "Contract-first anomaly detection over arbitrary corpora — a deterministic, NIST-validated Rust CLI."
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/copyleftdev/anomalyx"
edit-url-template = "https://github.com/copyleftdev/anomalyx/edit/main/docs/{path}"
# Served as a GitHub Pages project site at /anomalyx/.
site-url = "/anomalyx/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
